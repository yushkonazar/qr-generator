<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Project</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./sourse/icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="./sourse/icon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="./sourse/icon.svg">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        
        <div class="container-wrapper">
            <h1>Make your own QR-code</h1>
            <div class="input">
                <input type="url" id="url" placeholder="https://example.com">
                <input type="text" id="filename" placeholder="File name (optional)">
                <button class="generate-btn">Generate</button>
            </div>
        </div>

        <div class="output">
            <p class="download-hint">Click to download PNG</p>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
